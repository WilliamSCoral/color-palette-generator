<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Paletas Circular</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <div class="pagina">

      <h1 class="pagina__titulo">Generador de Paletas Circular</h1>

      <div class="pagina__contenido">

        <section class="seccion-principal">

          <!-- BARRA DE CONTROLES -->
          <div class="barra-controles">

            <div class="barra-controles__tamano">
              <label class="barra-controles__etiqueta">Tamaño de paleta:</label>
              <select class="barra-controles__selector">
                <option>4 colores</option>
                <option>5 colores</option>
                <option selected>6 colores</option>
                <option>7 colores</option>
                <option>8 colores</option>
                <option>9 colores</option>
              </select>
            </div>

            <div class="barra-controles__modo-copia">
              <label class="barra-controles__etiqueta">Modo Copiar:</label>
              <button class="alternador-copia__boton alternador-copia__boton--activo">HEX</button>
              <button class="alternador-copia__boton">HSL</button>
            </div>

            <div class="barra-controles__acciones">
              <button class="boton-girar">Girar Rueda</button>
              <button class="boton-guardar">💾</button>
            </div>

          </div>

          <!-- ÁREA DE RUEDA + LISTA -->
          <div class="area-rueda">

            <ul class="lista-colores">
              <li class="lista-colores__item">
                <div class="lista-colores__muestra"></div>
                <span class="lista-colores__hex">#A6D714</span>
                <button class="lista-colores__candado">🔓</button>
              </li>
            </ul>

            <div class="rueda-contenedor">
              <svg class="rueda" viewBox="-1.1 -1.1 2.2 2.2"></svg>
            </div>

          </div>

        </section>

        <aside class="panel-guardadas">
          <h2>Paletas Guardadas</h2>
          <ul>
            <li>
              <div>
                <span>Paleta (5 colores)</span>
                <div>
                  <button>📋</button>
                  <button>🗑️</button>
                </div>
              </div>
              <div></div>
            </li>
          </ul>
        </aside>

      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
